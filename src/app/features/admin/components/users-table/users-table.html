<div class="card">

  <div class="card-body">

    <div
      class="d-flex justify-content-between align-items-center mb-4 users-header">

      <h5 class="mb-0">
        Users
      </h5>

      <div class="search-box">

        <input
          type="text"
          class="form-control"
          placeholder="Search by name..."
          (input)="onSearch($event)">

      </div>

    </div>

    <div class="table-responsive">

      <table class="table table-hover">

        <thead>

          <tr>

            <th>Name</th>

            <th>Email</th>

            <th>Role</th>

            <th>Actions</th>

          </tr>

        </thead>

        <tbody>

          @if(admin.filteredUsers().length === 0){

            <tr>

              <td
                colspan="4"
                class="text-center py-5 text-muted">

                No users found matching your search.

              </td>

            </tr>

          }

          @for(
            user of admin.filteredUsers();
            track user.id
          ){

            <tr>

              <td>
                {{ user.name }}
              </td>

              <td>
                {{ user.email }}
              </td>

              <td>

                <span
                  class="badge"
                  [class.admin-badge]="user.role === 'admin'"
                  [class.customer-badge]="user.role === 'customer'">

                  {{ user.role }}

                </span>

              </td>

              <td>

                <button
                  class="btn btn-primary btn-sm"
                  (click)="viewUser(user.id)">

                  View Details

                </button>

              </td>

            </tr>

          }

        </tbody>

      </table>

    </div>

  </div>

</div>
