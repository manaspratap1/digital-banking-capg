<div class="container mt-5">

  <div class="row justify-content-center">

    <div class="col-md-4">

      <div class="card">

        <div class="card-body">

          <h3 class="text-center mb-4">
            Login
          </h3>

          <form
            [formGroup]="loginForm"
            (ngSubmit)="onSubmit()">

            <div class="mb-3">

              <label class="form-label">
                Email
              </label>

              <input
                type="email"
                class="form-control"
                formControlName="email">

            </div>

            <div class="mb-3">

              <label class="form-label">
                Password
              </label>

              <input
                type="password"
                class="form-control"
                formControlName="password">

            </div>

            @if(loginError){

              <div class="alert alert-danger">
                Invalid Credentials
              </div>

            }

            <button
              class="btn btn-primary w-100"
              type="submit">

              Login

            </button>

          </form>

        </div>

      </div>

    </div>

  </div>

</div>
