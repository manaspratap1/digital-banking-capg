<div class="container mt-5">

  <div
    class="card shadow mx-auto"
    style="max-width:500px;">

    <div class="card-body">

      <h3 class="mb-4">

        Register

      </h3>

      <form
        [formGroup]="form"
        (ngSubmit)="register()">

        <div class="mb-3">

          <label>
            Name
          </label>

          <input
            type="text"
            class="form-control"
            formControlName="name">

        </div>

        <div class="mb-3">

          <label>
            Email
          </label>

          <input
            type="email"
            class="form-control"
            formControlName="email">

        </div>

        <div class="mb-3">

          <label>
            Password
          </label>

          <input
            type="password"
            class="form-control"
            formControlName="password">

        </div>

        <button
          class="btn btn-primary w-100">

          Register

        </button>

      </form>

      <p class="mt-3 text-center">

        Already have an account?

        <a routerLink="/login">
          Login
        </a>

      </p>

    </div>

  </div>

</div>
