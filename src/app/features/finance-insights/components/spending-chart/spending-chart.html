<div class="card shadow-sm border-0">

  <div class="card-body">

    <h5 class="mb-3">
      Spending By Category
    </h5>

    <div class="chart-container">

      @if(hasData()) {

        <canvas
          baseChart
          [data]="pieChartData"
          [type]="pieChartType">
        </canvas>

      } @else {

        <div class="empty-chart">

          <div class="empty-chart-icon">
            <i class="bi bi-pie-chart"></i>
          </div>

          <h6>
            No spending data yet
          </h6>

          <p>
            Your category breakdown will appear here once transactions are available.
          </p>

        </div>

      }

    </div>

  </div>

</div>
