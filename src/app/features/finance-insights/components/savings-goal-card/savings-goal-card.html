<div class="card shadow-sm border-0">

  <div class="card-body">

    <h5 class="mb-3">
      Savings Goals
    </h5>

    <div class="goals-container">

  @for( goal of finance.savingsGoals(); track goal.id){

        <div class="mb-4">

        <div
            class="d-flex justify-content-between">

            <span>
            {{ goal.title }}
            </span>

            <span>

            ₹{{ goal.currentAmount }}
            /
            ₹{{ goal.targetAmount }}

            </span>

        </div>

        <div class="progress mt-2">

            <div
            class="progress-bar"
            [style.width.%]="
                (goal.currentAmount /
                goal.targetAmount) * 100
            ">

            </div>

        </div>

        </div>

    }

    </div>

  </div>

</div>
