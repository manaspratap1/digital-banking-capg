<div class="card shadow-sm border-0">

  <div class="card-body">

    <div class="d-flex justify-content-between align-items-center mb-3">

      <h5 class="mb-0">
        Savings Goals
      </h5>

      <button
        class="btn btn-primary btn-sm"
        type="button"
        (click)="addGoal.emit()">

        Add Goal

      </button>

    </div>

    <div class="goals-container">

      @if(finance.savingsGoals().length === 0) {

        <div class="empty-goals">

          <h6>
            No savings goals yet
          </h6>

          <p>
            Add your first goal to start tracking progress.
          </p>

        </div>

      } @else {

        @for(goal of finance.savingsGoals(); track goal.id) {

          <div class="mb-4 goal-item">

            <div class="d-flex justify-content-between">

              <span>
                {{ goal.title }}
              </span>

              <span>
                ₹{{ goal.currentAmount }}
                /
                ₹{{ goal.targetAmount }}
              </span>

            </div>

            <div class="progress mt-2">

              <div
                class="progress-bar"
                [style.width.%]="goal.targetAmount > 0 ? (goal.currentAmount / goal.targetAmount) * 100 : 0">

              </div>

            </div>

          </div>

        }

      }

    </div>

  </div>

</div>
