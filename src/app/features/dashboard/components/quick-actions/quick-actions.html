<div class="actions-card">

  <div class="section-header">

    <div>

      <h5>
        Quick Actions
      </h5>

      <p>
        Frequently used banking services
      </p>

    </div>

  </div>

  <div class="actions-grid">

    <button
      class="action-tile transfer"
      (click)="goToTransfers()">

      <div class="action-icon">
        <i class="bi bi-arrow-left-right"></i>
      </div>

      <div class="action-content">

        <h6>
          Transfer Money
        </h6>

        <small>
          Send money instantly
        </small>

      </div>

    </button>

    <button
      class="action-tile bills"
      (click)="goToBills()">

      <div class="action-icon">
        <i class="bi bi-lightning-charge"></i>
      </div>

      <div class="action-content">

        <h6>
          Pay Bills
        </h6>

        <small>
          Electricity, internet & more
        </small>

      </div>

    </button>

    <button
      class="action-tile insights"
      (click)="goToFinance()">

      <div class="action-icon">
        <i class="bi bi-bar-chart-line"></i>
      </div>

      <div class="action-content">

        <h6>
          Financial Insights
        </h6>

        <small>
          Track spending patterns
        </small>

      </div>

    </button>

  </div>

</div>
