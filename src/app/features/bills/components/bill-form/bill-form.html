<div class="card">

  <div class="card-body">

    <h5 class="mb-3">
      Add Bill
    </h5>

    <form
      [formGroup]="billForm"
      (ngSubmit)="onSubmit()">

      <div class="row">

        <div class="col-md-3">

          <input
            type="text"
            class="form-control"
            placeholder="Biller Name"
            formControlName="billerName">

        </div>

        <div class="col-md-3">

          <input
            type="text"
            class="form-control"
            placeholder="Category"
            formControlName="category">

        </div>

        <div class="col-md-2">

          <input
            type="number"
            class="form-control"
            placeholder="Amount"
            formControlName="amount">

        </div>

        <div class="col-md-2">

          <input
            type="date"
            class="form-control"
            formControlName="dueDate">

        </div>

        <div class="col-md-2">

          <button
            class="btn btn-primary w-100"
            type="submit">

            Add

          </button>

        </div>

      </div>

    </form>

  </div>

</div>
